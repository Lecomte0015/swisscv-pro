<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion — SwissCV Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --swiss-red: #D50000;
            --swiss-black: #0D0D0D;
            --swiss-white: #FFFFFF;
            --swiss-gray: #E6E6E6;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0D0D0D 0%, #2D2D2D 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            background: white;
            color: var(--swiss-black);
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--swiss-black);
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 2px solid var(--swiss-gray);
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: var(--swiss-red);
            border-bottom-color: var(--swiss-red);
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--swiss-black);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid var(--swiss-gray);
            border-radius: 6px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            outline: none;
            border-color: var(--swiss-red);
        }

        .btn {
            width: 100%;
            padding: 16px;
            background: var(--swiss-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(213, 0, 0, 0.3);
        }

        .btn:hover {
            background: #B80000;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(213, 0, 0, 0.5);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #FFE5E5;
            border: 1px solid #FF5252;
            color: #D50000;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #E8F5E9;
            border: 1px solid #4CAF50;
            color: #2E7D32;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .footer-links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--swiss-gray);
        }

        .footer-links a {
            color: var(--swiss-red);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .hidden {
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🇨🇭</div>
            <div class="logo-text">SwissCV Pro</div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="login">Connexion</button>
            <button class="tab" data-tab="signup">Inscription</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form">
            <div class="form-group">
                <label for="loginEmail">Email</label>
                <input type="email" id="loginEmail" required placeholder="votre@email.ch">
            </div>

            <div class="form-group">
                <label for="loginPassword">Mot de passe</label>
                <input type="password" id="loginPassword" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn" id="loginBtn">
                Se connecter
            </button>

            <div style="text-align: center; margin-top: 16px;">
                <a href="forgot-password.html" style="color: #666; text-decoration: none; font-size: 14px;">
                    Mot de passe oublié ?
                </a>
            </div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="auth-form hidden">
            <div class="form-group">
                <label for="signupEmail">Email</label>
                <input type="email" id="signupEmail" required placeholder="votre@email.ch">
            </div>

            <div class="form-group">
                <label for="signupPassword">Mot de passe</label>
                <input type="password" id="signupPassword" required placeholder="••••••••" minlength="8">
                <small style="color: #666; font-size: 12px; margin-top: 4px; display: block;">
                    Minimum 8 caractères
                </small>
            </div>

            <div class="form-group">
                <label for="signupPasswordConfirm">Confirmer le mot de passe</label>
                <input type="password" id="signupPasswordConfirm" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn" id="signupBtn">
                Créer un compte
            </button>
        </form>

        <div class="footer-links">
            <a href="index.html">← Retour à l'accueil</a>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://swisscv-pro.dallyhermann-71e.workers.dev';

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetTab = tab.dataset.tab;

                // Update active tab
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Show/hide forms
                if (targetTab === 'login') {
                    document.getElementById('loginForm').classList.remove('hidden');
                    document.getElementById('signupForm').classList.add('hidden');
                } else {
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('signupForm').classList.remove('hidden');
                }

                // Clear messages
                clearMessages();
            });
        });

        // Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            console.log('📤 Tentative de connexion:', email);

            clearMessages();
            btn.disabled = true;
            btn.innerHTML = 'Connexion en cours...<span class="loading-spinner"></span>';

            try {
                console.log('🌐 Appel API:', `${API_ENDPOINT}/auth/login`);

                const response = await fetch(`${API_ENDPOINT}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('📥 Réponse HTTP:', response.status, response.statusText);

                const data = await response.json();
                console.log('📦 Données reçues:', data);

                if (data.success) {
                    console.log('✅ Connexion réussie');
                    console.log('🔑 Token reçu:', data.token ? 'Oui' : 'Non');
                    console.log('👤 User reçu:', data.user);

                    // Sauvegarder le token
                    localStorage.setItem('swisscv_token', data.token);
                    localStorage.setItem('swisscv_user', JSON.stringify(data.user));

                    console.log('💾 Token sauvegardé:', localStorage.getItem('swisscv_token') ? 'Oui' : 'Non');
                    console.log('💾 User sauvegardé:', localStorage.getItem('swisscv_user') ? 'Oui' : 'Non');

                    showSuccess('Connexion réussie ! Redirection...');

                    console.log('🔄 Vérification profil complété:', data.user.profileCompleted);

                    setTimeout(() => {
                        console.log('➡️ Redirection maintenant !');

                        // Rediriger selon profil complété
                        if (data.user.profileCompleted) {
                            console.log('✅ Profil complété → dashboard.html');
                            window.location.href = 'dashboard.html';
                        } else {
                            console.log('⚠️ Profil incomplet → onboarding.html');
                            window.location.href = 'onboarding.html';
                        }
                    }, 1000);
                } else {
                    console.error('❌ Connexion échouée:', data.error);

                    // Gérer l'erreur de confirmation d'email
                    if (data.errorCode === 'EMAIL_NOT_CONFIRMED') {
                        showError(data.error);

                        // Ajouter bouton pour renvoyer l'email
                        const errorEl = document.getElementById('errorMessage');
                        const resendBtn = document.createElement('button');
                        resendBtn.textContent = '📧 Renvoyer l\'email de confirmation';
                        resendBtn.className = 'btn';
                        resendBtn.style.marginTop = '12px';
                        resendBtn.style.background = '#666';
                        resendBtn.onclick = () => resendConfirmationEmail(email);

                        // Vérifier si le bouton n'existe pas déjà
                        if (!errorEl.querySelector('button')) {
                            errorEl.appendChild(resendBtn);
                        }
                    } else {
                        showError(data.error || 'Erreur de connexion');
                    }
                }
            } catch (error) {
                console.error('❌ Erreur complète:', error);
                showError('Erreur de connexion au serveur');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Se connecter';
            }
        });

        // Signup
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            const btn = document.getElementById('signupBtn');

            console.log('📤 Tentative d\'inscription:', email);

            clearMessages();

            // Valider les mots de passe
            if (password !== passwordConfirm) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }

            if (password.length < 8) {
                showError('Le mot de passe doit contenir au moins 8 caractères');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = 'Création en cours...<span class="loading-spinner"></span>';

            try {
                console.log('🌐 Appel API:', `${API_ENDPOINT}/auth/signup`);

                const response = await fetch(`${API_ENDPOINT}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('📥 Réponse HTTP:', response.status, response.statusText);

                const data = await response.json();
                console.log('📦 Données reçues:', data);

                if (data.success) {
                    console.log('✅ Inscription réussie');
                    console.log('🔑 Token reçu:', data.token ? 'Oui' : 'Non');

                    showSuccess('🎉 Compte créé avec succès ! Vérifiez votre email pour confirmer votre compte (pensez à vérifier les spams).');

                    console.log('🔄 Basculer vers onglet connexion dans 5 secondes');

                    // Basculer vers l'onglet login après 5 secondes
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                        showSuccess('Confirmez votre email puis connectez-vous !');
                    }, 5000);
                } else {
                    console.error('❌ Inscription échouée:', data.error);
                    showError(data.error || 'Erreur lors de la création du compte');
                }
            } catch (error) {
                console.error('❌ Erreur complète:', error);
                showError('Erreur de connexion au serveur');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Créer un compte';
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.textContent = message;
            successEl.classList.add('show');
        }

        async function resendConfirmationEmail(email) {
            try {
                const response = await fetch(`${API_ENDPOINT}/auth/resend-confirmation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('✅ Email de confirmation renvoyé ! Vérifiez votre boîte de réception (et les spams).');
                    // Supprimer le bouton de renvoi
                    const errorEl = document.getElementById('errorMessage');
                    const btn = errorEl.querySelector('button');
                    if (btn) btn.remove();
                } else {
                    showError(data.error || 'Erreur lors de l\'envoi');
                }
            } catch (error) {
                console.error('Erreur resend:', error);
                showError('Erreur de connexion au serveur');
            }
        }

        function clearMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
            // Nettoyer les boutons ajoutés dynamiquement
            const errorEl = document.getElementById('errorMessage');
            const btn = errorEl.querySelector('button');
            if (btn) btn.remove();
        }

        // Si déjà connecté, vérifier le profil et rediriger
        (async function () {
            const token = localStorage.getItem('swisscv_token');
            if (token) {
                try {
                    // Vérifier le profil via /auth/me
                    const response = await fetch(`${API_ENDPOINT}/auth/me`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        if (data.success && data.user) {
                            // Rediriger selon profil complété
                            if (data.user.profileCompleted) {
                                window.location.href = 'dashboard.html';
                            } else {
                                window.location.href = 'onboarding.html';
                            }
                        }
                    } else {
                        // Token invalide, le laisser sur login
                        localStorage.removeItem('swisscv_token');
                        localStorage.removeItem('swisscv_user');
                    }
                } catch (error) {
                    console.error('Erreur vérification token:', error);
                }
            }
        })();
    </script>
</body>

</html>
