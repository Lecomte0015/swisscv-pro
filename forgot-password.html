<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — SwissCV Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --swiss-red: #D50000;
            --swiss-black: #0D0D0D;
            --swiss-white: #FFFFFF;
            --swiss-gray: #E6E6E6;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0D0D0D 0%, #2D2D2D 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .auth-container {
            background: white;
            color: var(--swiss-black);
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--swiss-black);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .description {
            text-align: center;
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--swiss-black);
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid var(--swiss-gray);
            border-radius: 6px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        input:focus {
            outline: none;
            border-color: var(--swiss-red);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--swiss-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(213, 0, 0, 0.3);
        }
        
        .btn:hover {
            background: #B80000;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(213, 0, 0, 0.5);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #FFE5E5;
            border: 1px solid #FF5252;
            color: #D50000;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: #E8F5E9;
            border: 1px solid #4CAF50;
            color: #2E7D32;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            line-height: 1.6;
        }
        
        .success-message.show {
            display: block;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--swiss-gray);
        }
        
        .footer-links a {
            color: var(--swiss-red);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin: 0 8px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .info-box {
            background: #E3F2FD;
            border-left: 4px solid #2196F3;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 24px;
            font-size: 14px;
            line-height: 1.6;
            color: #1565C0;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🇨🇭</div>
            <div class="logo-text">SwissCV Pro</div>
        </div>
        
        <h1>Mot de passe oublié ?</h1>
        <p class="description">
            Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.
        </p>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="forgotPasswordForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="votre@email.ch" autofocus>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                Envoyer le lien de réinitialisation
            </button>
        </form>
        
        <div class="footer-links">
            <a href="login.html">← Retour à la connexion</a>
            <a href="index.html">Accueil</a>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://swisscv-api.dallyhermann-71e.workers.dev';
        
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('submitBtn');
            
            // Clear messages
            clearMessages();
            
            // Validation
            if (!email) {
                showError('Veuillez entrer votre adresse email');
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Veuillez entrer une adresse email valide');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = 'Envoi en cours...<span class="loading-spinner"></span>';
            
            try {
                const response = await fetch(`${API_ENDPOINT}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess(
                        `Un email de réinitialisation a été envoyé à <strong>${email}</strong>.<br><br>` +
                        `Veuillez vérifier votre boîte de réception (et vos spams) et cliquer sur le lien pour réinitialiser votre mot de passe.<br><br>` +
                        `<small>Le lien est valable pendant 1 heure.</small>`
                    );
                    
                    // Désactiver le formulaire
                    document.getElementById('forgotPasswordForm').style.opacity = '0.5';
                    document.getElementById('forgotPasswordForm').style.pointerEvents = 'none';
                } else {
                    // Pour des raisons de sécurité, on affiche toujours un message de succès
                    // même si l'email n'existe pas (pour éviter l'énumération des comptes)
                    showSuccess(
                        `Si un compte existe avec l'adresse <strong>${email}</strong>, vous recevrez un email de réinitialisation dans quelques instants.<br><br>` +
                        `<small>Si vous ne recevez rien, vérifiez que l'adresse email est correcte.</small>`
                    );
                    
                    document.getElementById('forgotPasswordForm').style.opacity = '0.5';
                    document.getElementById('forgotPasswordForm').style.pointerEvents = 'none';
                }
            } catch (error) {
                console.error('Forgot password error:', error);
                showError('Erreur de connexion au serveur. Veuillez réessayer.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Envoyer le lien de réinitialisation';
            }
        });
        
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.innerHTML = message;
            errorEl.classList.add('show');
        }
        
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.innerHTML = message;
            successEl.classList.add('show');
        }
        
        function clearMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }
    </script>
</body>
</html>
