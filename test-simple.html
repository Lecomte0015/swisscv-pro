<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Simple - SwissCV Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .success {
            background: #d4edda;
            border: 2px solid #28a745;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        h1 {
            color: #28a745;
            margin: 0 0 20px 0;
        }

        .info {
            background: white;
            padding: 20px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: left;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="success">
        <h1>✅ Cette page se charge correctement !</h1>
        <p>Si vous voyez ce message, cela signifie que Cloudflare Pages fonctionne.</p>

        <div class="info">
            <h3>Tests à effectuer :</h3>

            <button onclick="testWorker()">1. Tester le Worker</button>
            <button onclick="testAuth()">2. Tester localStorage</button>
            <button onclick="goToJobSearch()">3. Aller sur job-search.html</button>

            <div id="result"></div>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://swisscv-pro.dallyhermann-71e.workers.dev';

        function showResult(message, type = 'info') {
            const result = document.getElementById('result');
            result.style.background = type === 'success' ? '#d4edda' : type === 'error' ? '#f8d7da' : '#d1ecf1';
            result.style.border = type === 'success' ? '2px solid #28a745' : type === 'error' ? '2px solid #dc3545' : '2px solid #0c5460';
            result.innerHTML = message;
        }

        async function testWorker() {
            showResult('🔄 Test du worker en cours...', 'info');
            try {
                const response = await fetch(`${API_ENDPOINT}/jobs/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: 'developer', location: 'Geneva' })
                });

                const data = await response.json();

                if (data.success && data.offers && data.offers.length > 0) {
                    showResult(`✅ Worker fonctionne ! ${data.offers.length} offres trouvées.<br>Première offre: ${data.offers[0].title}`, 'success');
                } else {
                    showResult(`❌ Worker répond mais pas de données: ${JSON.stringify(data)}`, 'error');
                }
            } catch (error) {
                showResult(`❌ Erreur worker: ${error.message}`, 'error');
            }
        }

        function testAuth() {
            const token = localStorage.getItem('swisscv_token');
            const user = localStorage.getItem('swisscv_user');

            if (token && user) {
                showResult(`✅ Token trouvé !<br>User: ${user.substring(0, 50)}...`, 'success');
            } else {
                showResult(`❌ Pas de token dans localStorage.<br>Vous devez vous connecter d'abord.`, 'error');
            }
        }

        function goToJobSearch() {
            showResult('🔄 Redirection vers job-search.html...', 'info');
            setTimeout(() => {
                window.location.href = '/job-search.html';
            }, 1000);
        }

        // Afficher les infos au chargement
        window.onload = function () {
            console.log('✅ Page test-simple.html chargée');
            console.log('URL actuelle:', window.location.href);
            console.log('Token présent:', !!localStorage.getItem('swisscv_token'));
        };
    </script>
</body>

</html>
