<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe — SwissCV Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --swiss-red: #D50000;
            --swiss-black: #0D0D0D;
            --swiss-white: #FFFFFF;
            --swiss-gray: #E6E6E6;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0D0D0D 0%, #2D2D2D 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .auth-container {
            background: white;
            color: var(--swiss-black);
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 100%;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--swiss-black);
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }
        
        .description {
            text-align: center;
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--swiss-black);
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid var(--swiss-gray);
            border-radius: 6px;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        input:focus {
            outline: none;
            border-color: var(--swiss-red);
        }
        
        .password-strength {
            margin-top: 8px;
            font-size: 13px;
        }
        
        .strength-bar {
            height: 4px;
            background: var(--swiss-gray);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        
        .strength-bar-fill {
            height: 100%;
            transition: all 0.3s;
            border-radius: 2px;
        }
        
        .strength-weak { background: #F44336; width: 33%; }
        .strength-medium { background: #FF9800; width: 66%; }
        .strength-strong { background: #4CAF50; width: 100%; }
        
        .btn {
            width: 100%;
            padding: 16px;
            background: var(--swiss-red);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(213, 0, 0, 0.3);
        }
        
        .btn:hover {
            background: #B80000;
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(213, 0, 0, 0.5);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-message {
            background: #FFE5E5;
            border: 1px solid #FF5252;
            color: #D50000;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .success-message {
            background: #E8F5E9;
            border: 1px solid #4CAF50;
            color: #2E7D32;
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            line-height: 1.6;
        }
        
        .success-message.show {
            display: block;
        }
        
        .footer-links {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--swiss-gray);
        }
        
        .footer-links a {
            color: var(--swiss-red);
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin: 0 8px;
        }
        
        .footer-links a:hover {
            text-decoration: underline;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .password-requirements {
            background: #F5F5F5;
            padding: 16px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 13px;
        }
        
        .password-requirements ul {
            list-style: none;
            padding: 0;
            margin: 8px 0 0 0;
        }
        
        .password-requirements li {
            padding: 4px 0;
            color: #666;
        }
        
        .password-requirements li.valid {
            color: #4CAF50;
        }
        
        .password-requirements li.valid::before {
            content: "✓ ";
            font-weight: bold;
        }
        
        .password-requirements li::before {
            content: "○ ";
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <div class="logo-icon">🇨🇭</div>
            <div class="logo-text">SwissCV Pro</div>
        </div>
        
        <h1>Réinitialiser le mot de passe</h1>
        <p class="description">
            Choisissez un nouveau mot de passe sécurisé pour votre compte.
        </p>
        
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <form id="resetPasswordForm">
            <div class="form-group">
                <label for="password">Nouveau mot de passe</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="8">
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-bar-fill" id="strengthBar"></div>
                    </div>
                    <div id="strengthText" style="margin-top: 8px; font-size: 13px;"></div>
                </div>
            </div>
            
            <div class="form-group">
                <label for="passwordConfirm">Confirmer le mot de passe</label>
                <input type="password" id="passwordConfirm" required placeholder="••••••••">
            </div>
            
            <div class="password-requirements">
                <strong>Le mot de passe doit contenir :</strong>
                <ul id="requirements">
                    <li id="req-length">Au moins 8 caractères</li>
                    <li id="req-uppercase">Au moins une majuscule</li>
                    <li id="req-lowercase">Au moins une minuscule</li>
                    <li id="req-number">Au moins un chiffre</li>
                </ul>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">
                Réinitialiser le mot de passe
            </button>
        </form>
        
        <div class="footer-links">
            <a href="login.html">← Retour à la connexion</a>
        </div>
    </div>

    <script>
        const API_ENDPOINT = 'https://swisscv-api.dallyhermann-71e.workers.dev';
        
        // Récupérer le token depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || urlParams.get('access_token');
        
        // Vérifier que le token existe
        if (!token) {
            showError('Lien invalide ou expiré. Veuillez demander un nouveau lien de réinitialisation.');
            document.getElementById('resetPasswordForm').style.display = 'none';
        }
        
        // Password strength checker
        const passwordInput = document.getElementById('password');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        passwordInput.addEventListener('input', () => {
            const password = passwordInput.value;
            const strength = checkPasswordStrength(password);
            
            strengthBar.className = 'strength-bar-fill';
            
            if (strength.score < 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = '⚠️ Faible';
                strengthText.style.color = '#F44336';
            } else if (strength.score < 4) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = '⚡ Moyen';
                strengthText.style.color = '#FF9800';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = '✓ Fort';
                strengthText.style.color = '#4CAF50';
            }
            
            // Update requirements
            updateRequirements(password);
        });
        
        function checkPasswordStrength(password) {
            let score = 0;
            
            if (password.length >= 8) score++;
            if (password.length >= 12) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/\d/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;
            
            return { score };
        }
        
        function updateRequirements(password) {
            const requirements = {
                'req-length': password.length >= 8,
                'req-uppercase': /[A-Z]/.test(password),
                'req-lowercase': /[a-z]/.test(password),
                'req-number': /\d/.test(password)
            };
            
            for (const [id, valid] of Object.entries(requirements)) {
                const el = document.getElementById(id);
                if (valid) {
                    el.classList.add('valid');
                } else {
                    el.classList.remove('valid');
                }
            }
        }
        
        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            const btn = document.getElementById('submitBtn');
            
            clearMessages();
            
            // Validation
            if (password !== passwordConfirm) {
                showError('Les mots de passe ne correspondent pas');
                return;
            }
            
            if (password.length < 8) {
                showError('Le mot de passe doit contenir au moins 8 caractères');
                return;
            }
            
            // Check strength
            const strength = checkPasswordStrength(password);
            if (strength.score < 2) {
                showError('Le mot de passe est trop faible. Ajoutez des majuscules, des chiffres ou des caractères spéciaux.');
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = 'Réinitialisation...<span class="loading-spinner"></span>';
            
            try {
                const response = await fetch(`${API_ENDPOINT}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: token,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess(
                        '✓ Votre mot de passe a été réinitialisé avec succès !<br><br>' +
                        'Vous allez être redirigé vers la page de connexion dans 3 secondes...'
                    );
                    
                    document.getElementById('resetPasswordForm').style.display = 'none';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } else {
                    showError(data.error || 'Erreur lors de la réinitialisation du mot de passe');
                }
            } catch (error) {
                console.error('Reset password error:', error);
                showError('Erreur de connexion au serveur. Veuillez réessayer.');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Réinitialiser le mot de passe';
            }
        });
        
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.innerHTML = message;
            errorEl.classList.add('show');
        }
        
        function showSuccess(message) {
            const successEl = document.getElementById('successMessage');
            successEl.innerHTML = message;
            successEl.classList.add('show');
        }
        
        function clearMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }
    </script>
</body>
</html>
